<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | ConstiTUT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #dde8ff 40%, #fffdfd 100%);
    }

    .reset-shell {
      width: min(98%, 520px);
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 26px 70px rgba(15, 23, 42, 0.1);
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .reset-shell h2 {
      margin: 0 0 12px;
      font-size: 2rem;
      color: #111827;
    }

    .reset-shell p {
      margin: 0 0 24px;
      color: #475569;
      line-height: 1.75;
    }

    .reset-shell input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 16px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      outline: none;
      font-size: 1rem;
    }

    .reset-shell input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .reset-shell button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: white;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .reset-shell button:hover {
      background: #0f172a;
      transform: translateY(-1px);
    }

    .reset-link {
      margin-top: 20px;
      text-align: center;
    }

    .reset-link a {
      color: #2563eb;
      text-decoration: none;
    }

    .reset-link a:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <section class="reset-shell">
    <h2 id="pageTitle">Reset Password</h2>
    <p id="pageSubtitle">Enter your registered email to receive a password reset link, or set a new password if you already have a valid token.</p>

    <form id="emailForm">
      <input type="email" id="resetEmail" placeholder="Registered email address" required />
      <button type="submit">Send Reset Link</button>
    </form>

    <div id="resetMessage" class="hidden rounded-xl px-4 py-3 mb-5 text-sm"></div>

    <div id="resetMessage" class="hidden rounded-xl px-4 py-3 mb-5 text-sm"></div>

    <form id="passwordForm" class="hidden">
      <input type="password" id="newPassword" placeholder="New password" required />
      <button type="submit">Reset Password</button>
    </form>

    <div class="reset-link">
      <a href="/signup.html"><i class="fa-solid fa-arrow-left"></i> Back to Login / Signup</a>
    </div>
  </section>

  <script>
    const emailForm = document.getElementById('emailForm');
    const passwordForm = document.getElementById('passwordForm');
    const pageTitle = document.getElementById('pageTitle');
    const pageSubtitle = document.getElementById('pageSubtitle');

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (token) {
      emailForm.classList.add('hidden');
      passwordForm.classList.remove('hidden');
      pageTitle.textContent = 'Set New Password';
      pageSubtitle.textContent = 'Enter a new password for your account. Your reset token is valid for one hour.';
    const resetMessage = document.getElementById('resetMessage');

    function showResetMessage(message, type = 'info') {
      resetMessage.textContent = message;
      resetMessage.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800', 'bg-blue-100', 'text-blue-800');
      if (type === 'success') {
        resetMessage.classList.add('bg-green-100', 'text-green-800');
      } else if (type === 'error') {
        resetMessage.classList.add('bg-red-100', 'text-red-800');
      } else {
        resetMessage.classList.add('bg-blue-100', 'text-blue-800');
      }
    }

    function clearResetMessage() {
      resetMessage.classList.add('hidden');
      resetMessage.textContent = '';
    }

    emailForm.addEventListener('submit', async function(event) {
      event.preventDefault();
      clearResetMessage();
      const email = document.getElementById('resetEmail').value.trim();

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Unable to send reset link');
        }
        showResetMessage(data.message, 'success');
        emailForm.reset();
      } catch (error) {
        showResetMessage(error.message, 'error');
      }
    });

    passwordForm.addEventListener('submit', async function(event) {
      event.preventDefault();
      clearResetMessage();
      const newPassword = document.getElementById('newPassword').value;

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Unable to reset password');
        }
        showResetMessage(data.message, 'success');
        window.location.href = '/signup.html';
      } catch (error) {
        showResetMessage(error.message, 'error'
        showResetMessage(error.message, 'error');
      }
    });

    passwordForm.addEventListener('submit', async function(event) {
      event.preventDefault();
      clearResetMessage();
      const newPassword = document.getElementById('newPassword').value;

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Unable to reset password');
        }
        showResetMessage(data.message, 'success');
        window.location.href = '/signup.html';
      } catch (error) {
        showResetMessage(error.message, 'error');
      }
    });
  </script>
</body>
</html>
